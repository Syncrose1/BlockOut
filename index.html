<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Visual task management with treemap visualization, time blocks, and Pomodoro timer" />
    <title>BlockOut</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/bo-logo-v3.png" />
    <link rel="apple-touch-icon" href="/bo-logo-v3.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service worker retired — it precached '/' and '/index.html', which is
      // unsafe now that BlockOut is served under the /blockout sub-path (and
      // proxied on the syncratic.app origin). Proactively unregister any legacy
      // SW and clear its caches so stale shells don't linger. Offline use is
      // covered by the Electron desktop app.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then((regs) => regs.forEach((r) => r.unregister()))
          .catch(() => {});
        if (window.caches) {
          caches.keys().then((keys) => keys.forEach((k) => caches.delete(k))).catch(() => {});
        }
      }
    </script>
  </body>
</html>
